name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: bug
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch app
        2. Paste URL
        3. Observe error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v1.0.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs
      description: Paste full console output.
