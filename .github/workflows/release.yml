name: Build And Release Downloader

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller pillow customtkinter

      - name: Build EXE
        run: python -m PyInstaller downloader_v2.spec

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_assets | Out-Null
          Copy-Item dist/youtube-video-downloader.exe release_assets/youtube-video-downloader.exe

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/youtube-video-downloader.exe
          generate_release_notes: true
